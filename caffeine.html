<style>

  --surface:rgba(0,232,255,0.03); --surface-2:rgba(0,232,255,0.055);

*{box-sizing:border-box}

.page{position:relative;min-height:100dvh;background:var(--bg);padding:var(--space-8) var(--space-5) var(--space-16);isolation:isolate}
.page::before{content:'';position:absolute;inset:0;pointer-events:none;z-index:-1;background:radial-gradient(58% 42% at 82% 6%,var(--glow-1),transparent 70%),radial-gradient(48% 38% at 12% 92%,var(--glow-2),transparent 72%)}
.shell{max-width:860px;margin:0 auto}

/* ---- Header ---- */
.header{display:flex;justify-content:space-between;align-items:flex-start;gap:var(--space-4);margin-bottom:var(--space-8);flex-wrap:wrap}
.headerLeft{display:flex;flex-direction:column;gap:var(--space-3)}
.headerRight{display:flex;align-items:center;gap:var(--space-2)}
.back{display:inline-flex;align-items:center;gap:var(--space-2);align-self:flex-start;padding:6px 13px 6px 9px;background:var(--brand-soft);border:1px solid var(--brand-line);border-radius:var(--radius-pill);color:var(--brand);font-size:var(--text-xs);font-weight:600;letter-spacing:.01em;text-decoration:none;transition:background var(--duration) var(--ease-premium),border-color var(--duration) var(--ease-premium)}

.heroRow{display:flex;align-items:center;gap:var(--space-3)}

.title{font-family:var(--font-d);font-weight:700;font-size:var(--text-3xl);line-height:1;letter-spacing:-0.03em;margin:0}

.themeSeg{display:inline-flex;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-pill);padding:3px;gap:2px}
.themeBtn{appearance:none;background:transparent;border:0;color:var(--muted);font-family:var(--font-ui);font-size:11px;font-weight:600;letter-spacing:.02em;padding:5px 11px 5px 8px;border-radius:var(--radius-pill);cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:background var(--duration) var(--ease-premium),color var(--duration) var(--ease-premium)}
.themeBtn:hover{color:var(--muted-strong)}
.themeSwatch{width:11px;height:11px;border-radius:50%;box-shadow:0 0 0 1px var(--border-strong) inset;flex-shrink:0}
.themeBtnActive,.themeBtnActive:hover{background:var(--brand-soft);color:var(--fg)}
.themeBtnActive .themeSwatch{box-shadow:0 0 0 2px var(--bg),0 0 0 3px var(--brand)}

/* ---- No profile banner ---- */
.noProfile{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-4);border:1px solid var(--warn-line);background:var(--warn-soft);border-radius:var(--radius-lg);margin-bottom:var(--space-6);font-size:13px;color:var(--muted-strong)}
.noProfile a{color:var(--brand);font-weight:600;text-decoration:none}
.noProfile a:hover{text-decoration:underline}

/* ---- Status row ---- */
.statusRow{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--space-4);margin-bottom:var(--space-5)}

.statCard{padding:var(--space-5);border:1px solid var(--border);border-radius:var(--radius-lg);background:var(--bg-elevated);box-shadow:var(--card-shadow);transition:border-color var(--duration) var(--ease-premium)}
.statCard.safe{border-color:var(--pos-line)}
.statCard.warn{border-color:var(--warn-line)}
.statCard.danger{border-color:var(--neg-line)}

.statValue.yellow{color:var(--warn)}
.statValue.red{color:var(--neg)}
.statSub{font-family:var(--font-m);font-size:10px;letter-spacing:.08em;color:var(--muted);margin-top:var(--space-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ---- Timing bar ---- */
.timingBar{display:flex;align-items:center;gap:var(--space-5);padding:var(--space-4) var(--space-5);border:1px solid var(--brand-line);background:var(--brand-soft);border-radius:var(--radius-lg);margin-bottom:var(--space-6);flex-wrap:wrap;gap:var(--space-4)}
.timingItem{display:flex;align-items:center;gap:var(--space-3)}

.timingText{display:flex;flex-direction:column;gap:2px}
.timingLabel{font-family:var(--font-m);font-size:9px;text-transform:uppercase;letter-spacing:.16em;color:rgba(0,232,255,0.65)}
.timingValue{font-family:var(--font-d);font-weight:700;font-size:var(--text-base);color:var(--brand);letter-spacing:-0.01em}
.timingValue.past{color:var(--muted-strong)}

/* ---- Warning banner ---- */

.dangerBanner{display:none;align-items:center;gap:var(--space-3);padding:var(--space-4) var(--space-5);border:1px solid var(--neg-line);background:var(--neg-soft);border-radius:var(--radius-lg);margin-bottom:var(--space-5);font-size:13px;font-weight:600;color:var(--fg)}

/* ---- Chart ---- */
.chartCard{padding:var(--space-5) var(--space-5) var(--space-4);border:1px solid var(--border);border-radius:var(--radius-lg);background:var(--bg-elevated);box-shadow:var(--card-shadow);margin-bottom:var(--space-6)}
.chartHead{display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--space-4)}
.chartEyebrow{font-family:var(--font-m);font-size:10px;text-transform:uppercase;letter-spacing:.2em;color:var(--brand)}
.chartLegend{display:flex;align-items:center;gap:var(--space-4);font-family:var(--font-m);font-size:9px;text-transform:uppercase;letter-spacing:.12em}
.legendDot{width:8px;height:2px;border-radius:1px;flex-shrink:0}
.legendItem{display:flex;align-items:center;gap:5px;color:var(--muted)}
canvas#cafChart{display:block;width:100%;height:180px;cursor:default;border-radius:var(--radius-sm)}

/* ---- Log section ---- */
.sectionHead{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:var(--space-5)}
.sectionEyebrow{font-family:var(--font-m);font-size:10px;text-transform:uppercase;letter-spacing:.22em;color:var(--brand);margin-bottom:4px}
.sectionTitle{font-family:var(--font-d);font-size:var(--text-xl);font-weight:700;letter-spacing:-0.025em}
.btnGhost{display:inline-flex;align-items:center;gap:var(--space-2);padding:7px 15px;border-radius:var(--radius-pill);border:1px solid var(--border);background:transparent;color:var(--muted-strong);font-family:var(--font-ui);font-size:12px;font-weight:600;cursor:pointer;transition:border-color var(--duration) var(--ease-premium),background var(--duration) var(--ease-premium),color var(--duration) var(--ease-premium)}
.btnGhost:hover{border-color:var(--brand-line);background:var(--brand-soft);color:var(--brand)}
.btnPrimary{display:inline-flex;align-items:center;gap:var(--space-2);padding:8px 18px;border-radius:var(--radius-pill);border:1px solid transparent;background:var(--brand);color:var(--brand-ink);font-family:var(--font-ui);font-size:12px;font-weight:700;cursor:pointer;transition:filter var(--duration) var(--ease-premium),box-shadow var(--duration) var(--ease-premium)}

/* ---- Drink grid ---- */
.drinkGrid{display:grid;grid-template-columns:repeat(4,1fr);gap:var(--space-3);margin-bottom:var(--space-5)}

.drinkCard{display:flex;flex-direction:column;align-items:center;gap:var(--space-2);padding:var(--space-4) var(--space-3);border:1px solid var(--border);border-radius:var(--radius-md);background:var(--bg-elevated);cursor:pointer;text-align:center;transition:border-color var(--duration) var(--ease-premium),background var(--duration) var(--ease-premium),transform var(--duration) var(--ease-premium),box-shadow var(--duration) var(--ease-premium)}

.customFormRow{display:grid;grid-template-columns:1fr 120px auto;gap:var(--space-3);align-items:end}

/* ============================================================
 * Caffeine science
 * ============================================================ */
function getHalfLife(){
  const age = profile?.age;
  const sex = profile?.sex;
  let hl = HALF_LIFE_BASE;
  if (age) {
    if (age < 22) hl *= 0.88;
    else if (age > 60) hl *= 1.20;
    else if (age > 45) hl *= 1.08;
  }
  if (sex === 'F') hl *= 1.06; // slight average difference
  return hl;
}

function getMaxDose(){
  const custom = profile?.caffeineMgPerDay;
  if (custom && custom > 0) return Number(custom);
  return 400; // mg/day standard guideline
}

function levelAt(doseList, t){
  const hl = getHalfLife();
  return doseList.reduce((sum, d) => {
    const hrs = (t - d.timestamp) / 3600000;
    if (hrs < 0) return sum;
    return sum + d.mg * Math.pow(0.5, hrs / hl);
  }, 0);
}

function todayLogs(){
  const today = new Date().toDateString();
  return logs.filter(l => new Date(l.timestamp).toDateString() === today);
}

function parseTime(str){ // "HH:MM" → {h, m}
  if (!str) return null;
  const [h,m] = str.split(':').map(Number);
  return {h, m};
}

function todayAt(h, m){ // returns timestamp for today at h:m
  const d = new Date();
  d.setHours(h, m, 0, 0);
  return d.getTime();
}

function fmtTime(ts){ // timestamp → "HH:MM"
  const d = new Date(ts);
  return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
}

function fmtTimeHM(h, m){ // hours, minutes → "HH:MM"
  return Math.floor(h).toString().padStart(2,'0') + ':' + m.toString().padStart(2,'0');
}

function getFirstCupTime(){ // optimal = wakeTime + 90 min
  const wt = parseTime(health?.wakeTime);
  if (!wt) return null;
  const total = wt.h * 60 + wt.m + 90;
  return fmtTimeHM(Math.floor(total / 60) % 24, total % 60);
}

function getCutoffTime(){ // bedtime - 6h (half-life based)
  const bt = parseTime(health?.bedtime);
  if (!bt) return null;
  const total = bt.h * 60 + bt.m - 6 * 60;
  const totalAdj = ((total % (24*60)) + 24*60) % (24*60);
  return fmtTimeHM(Math.floor(totalAdj / 60), totalAdj % 60);
}

function getCurrentLevel(){
  return levelAt(todayLogs(), Date.now());
}

function getCrashTime(){ // when level drops below 75mg threshold after peak
  const doses = todayLogs();
  if (!doses.length) return null;
  const hl = getHalfLife();
  const now = Date.now();
  const peak = levelAt(doses, now);
  if (peak < 75) return null; // already below threshold
  // Binary-search for when it drops below 75
  let lo = now, hi = now + 24 * 3600000;
  for (let i = 0; i < 40; i++) {
    const mid = (lo + hi) / 2;
    if (levelAt(doses, mid) > 75) lo = mid;
    else hi = mid;
  }
  return hi;
}

}

/* ============================================================
 * Chart
 * ============================================================ */
function drawChart(){
  const canvas = document.getElementById('cafChart');
  if (!canvas) return;
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.offsetWidth;
  const H = 180;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  const doses = todayLogs();
  const maxDose = getMaxDose();
  const hl = getHalfLife();

  // Time window: 5am to 1am next day (20 hours)
  const today = new Date(); today.setHours(0,0,0,0);
  const START_H = 5, END_H = 25, RANGE = END_H - START_H;
  const xOf = h => ((h - START_H) / RANGE) * W;
  const maxY = Math.max(maxDose * 1.3, doses.reduce((a,b)=>a+b.mg,0) + 80, 350);
  const yOf = mg => H - 28 - (mg / maxY) * (H - 44); // 28px bottom for labels, 16px top

  // Background
  ctx.clearRect(0, 0, W, H);

  // Wake/sleep shaded zones
  const wt = parseTime(health?.wakeTime);
  const bt = parseTime(health?.bedtime);
  ctx.fillStyle = 'rgba(0,232,255,0.04)';
  if (wt) {
    const wakeH = wt.h + wt.m/60;
    const x1 = xOf(Math.max(START_H, wakeH));
    const x2 = xOf(Math.min(END_H, wakeH + 3));
    if (x2 > x1) { ctx.fillRect(x1, 0, x2 - x1, H - 28); }
  }

  // Grid lines
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 1;
  for (let hh = START_H; hh <= END_H; hh += 2) {
    const x = xOf(hh);
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H - 28); ctx.stroke();
  }
  // Horizontal grid
  for (let mg = 0; mg <= maxY; mg += 100) {
    const y = yOf(mg);
    if (y < 0 || y > H - 28) continue;
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    ctx.fillStyle = 'rgba(243,242,248,0.20)';
    ctx.font = `9px JetBrains Mono, monospace`;
    ctx.textAlign = 'left';
    ctx.fillText(mg + 'mg', 2, y - 3);
  }

  // Danger line
  ctx.setLineDash([5, 4]);
  ctx.lineWidth = 1.5;
  ctx.strokeStyle = 'rgba(251,113,133,0.55)';
  const dangerY = yOf(maxDose);
  ctx.beginPath(); ctx.moveTo(0, dangerY); ctx.lineTo(W, dangerY); ctx.stroke();
  // Warn line at 75%
  ctx.strokeStyle = 'rgba(251,191,36,0.40)';
  const warnY = yOf(maxDose * 0.75);
  ctx.beginPath(); ctx.moveTo(0, warnY); ctx.lineTo(W, warnY); ctx.stroke();
  ctx.setLineDash([]);

  // Caffeine curve
  const STEPS = RANGE * 12; // every 5 min
  const pts = [];
  for (let i = 0; i <= STEPS; i++) {
    const h = START_H + (i / STEPS) * RANGE;
    const t = today.getTime() + h * 3600000;
    const mg = levelAt(doses, t);
    pts.push({x: xOf(h), y: yOf(mg), mg});
  }

  if (doses.length > 0) {
    // Gradient fill
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, 'rgba(0,232,255,0.32)');
    grad.addColorStop(0.7, 'rgba(0,232,255,0.08)');
    grad.addColorStop(1, 'rgba(0,232,255,0.01)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.moveTo(pts[0].x, H - 28);
    ctx.lineTo(pts[0].x, pts[0].y);
    for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
    ctx.lineTo(pts[pts.length-1].x, H - 28);
    ctx.closePath();
    ctx.fill();

    // Stroke line
    ctx.strokeStyle = '#00E8FF';
    ctx.lineWidth = 2;
    ctx.lineJoin = 'round';
    ctx.shadowColor = 'rgba(0,232,255,0.5)';
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.moveTo(pts[0].x, pts[0].y);
    for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
    ctx.stroke();
    ctx.shadowBlur = 0;
  }

  // Cutoff time marker
  const co = getCutoffTime();
  if (co) {
    const coT = parseTime(co);
    const coH = coT.h + coT.m/60;
    if (coH >= START_H && coH <= END_H) {
      const coX = xOf(coH);
      ctx.strokeStyle = 'rgba(251,191,36,0.6)';
      ctx.setLineDash([3,3]);
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(coX, 0); ctx.lineTo(coX, H - 28); ctx.stroke();
      ctx.setLineDash([]);
    }
  }

  // Current time line
  const nowH = new Date().getHours() + new Date().getMinutes()/60;
  if (nowH >= START_H && nowH <= END_H) {
    const nowX = xOf(nowH);
    ctx.strokeStyle = 'rgba(255,255,255,0.55)';
    ctx.setLineDash([3,4]);
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(nowX, 0); ctx.lineTo(nowX, H - 28); ctx.stroke();
    ctx.setLineDash([]);
  }

  // Dose markers
  for (const d of doses) {
    const dDate = new Date(d.timestamp);
    const dH = dDate.getHours() + dDate.getMinutes()/60;
    if (dH < START_H || dH > END_H) continue;
    const dX = xOf(dH);
    const lvl = levelAt(doses, d.timestamp + 15*60000); // peak ~15min after
    const dY = yOf(Math.min(lvl, maxY * 0.95));
    ctx.fillStyle = '#00E8FF';
    ctx.shadowColor = 'rgba(0,232,255,0.8)';
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.arc(dX, dY, 4, 0, Math.PI*2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  // X-axis time labels
  ctx.fillStyle = 'rgba(243,242,248,0.32)';
  ctx.font = '9px JetBrains Mono, monospace';
  ctx.textAlign = 'center';
  for (let hh = START_H; hh <= END_H; hh += 2) {
    const x = xOf(hh);
    const actualH = hh % 24;
    const lbl = actualH === 0 ? '12am' : actualH === 12 ? '12pm' : actualH < 12 ? actualH + 'am' : (actualH-12) + 'pm';
    ctx.fillText(lbl, x, H - 8);
  }
}

/* ============================================================

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function themeSegHtml(){
  return '<div class="themeSeg">' +

      const swatch = t.swatch.startsWith('linear') ? 'background:' + t.swatch : 'background:' + t.swatch;
      return '<button type="button" class="themeBtn' + (currentTheme === t.key ? ' themeBtnActive' : '') + '" data-theme="' + t.key + '">'
        + '<span class="themeSwatch" style="' + swatch + '"></span>' + t.label + '</button>';
    }).join('') + '</div>';
}

function levelColor(mg, max){
  if (mg <= 0) return '';
  if (mg < max * 0.5) return 'green';
  if (mg < max * 0.75) return 'yellow';
  return 'red';
}

function levelCardClass(mg, max){
  if (mg <= 0) return '';
  if (mg < max * 0.5) return 'safe';
  if (mg < max * 0.85) return 'warn';
  return 'danger';
}

      <div class="timingItem">
        <span class="timingIcon">🌅</span>
        <div class="timingText">

      </div>
      <div class="timingSep"></div>
      <div class="timingItem">

        </div>`
      }

  // Re-bind events

  // Draw chart after DOM is ready

    drawChart();
    // Redraw every minute
    clearInterval(chartTimer);
    chartTimer = setInterval(() => drawChart(), 60000);
  });
}

/* ============================================================
 * Events
 * ============================================================ */
function addDrink(name, mg, emoji){
  const dose = {
    id: Date.now() + Math.random().toString(36).slice(2),
    timestamp: Date.now(),
    name,
    mg: Number(mg),
    emoji: emoji || '☕'
  };
  logs.push(dose);
  saveLogs();
  render();
}

function removeDose(id){
  logs = logs.filter(l => l.id !== id);
  saveLogs();
  render();
}

function bindEvents(){
  // Theme
  document.querySelectorAll('[data-theme]').forEach(btn => {
    btn.addEventListener('click', () => applyTheme(btn.dataset.theme));
  });

  // Drink cards
  document.querySelectorAll('.drinkCard').forEach(card => {
    card.addEventListener('click', () => {
      const {name, mg, emoji} = card.dataset;
      addDrink(name, mg, emoji);
    });
  });

  // Search
  const searchEl = document.getElementById('drinkSearch');
  if (searchEl) {
    searchEl.addEventListener('input', e => {
      searchQ = e.target.value;
      // Just re-render the grid part to avoid losing focus
      const filtered = searchQ.trim()
        ? DB.filter(d => d.name.toLowerCase().includes(searchQ.toLowerCase()) || d.cat.toLowerCase().includes(searchQ.toLowerCase()))
        : DB.slice(0, 12);
      const grid = document.getElementById('drinkGrid');
      if (grid) {
        grid.innerHTML = filtered.length
          ? filtered.map(d =>
            `<div class="drinkCard" data-name="${esc(d.name)}" data-mg="${d.mg}" data-emoji="${esc(d.emoji)}">
              <span class="drinkEmoji">${d.emoji}</span>
              <span class="drinkName">${esc(d.name)}</span>
              <span class="drinkMg">${d.mg}mg</span>
              <div class="drinkAdd" aria-hidden>+</div>
            </div>`
          ).join('')
          : `<div class="noResults">No drinks found for "<strong>${esc(searchQ)}</strong>"<br><small style="color:var(--muted)">Use + Custom above for unlisted drinks</small></div>`;
        // Re-bind drink cards in updated grid
        grid.querySelectorAll('.drinkCard').forEach(card => {
          card.addEventListener('click', () => {
            const {name, mg, emoji} = card.dataset;
            addDrink(name, mg, emoji);
          });
        });
      }
    });
    // Don't lose focus after re-render
    setTimeout(() => { if (document.activeElement !== searchEl) {} }, 0);
  }

  // Custom toggle
  const customToggle = document.getElementById('customToggle');
  if (customToggle) {
    customToggle.addEventListener('click', () => {
      customOpen = !customOpen;
      const form = document.getElementById('customForm');
      if (form) form.classList.toggle('open', customOpen);
      customToggle.textContent = customOpen ? '✕ Cancel' : '+ Custom';
    });
  }

  // Custom submit
  const customSubmit = document.getElementById('customSubmit');
  if (customSubmit) {
    customSubmit.addEventListener('click', () => {
      const nameEl = document.getElementById('customName');
      const mgEl = document.getElementById('customMg');
      const name = (nameEl?.value || '').trim();
      const mg = Number(mgEl?.value);
      if (!name) { nameEl?.focus(); return; }
      if (!mg || mg <= 0) { mgEl?.focus(); return; }
      addDrink(name, mg, '☕');
      customOpen = false;
    });
  }

  // Delete dose
  document.querySelectorAll('[data-del]').forEach(btn => {
    btn.addEventListener('click', () => removeDose(btn.dataset.del));
  });

  // Clear day
  const clearBtn = document.getElementById('clearDay');
  if (clearBtn) {
    clearBtn.addEventListener('click', () => {
      if (!confirm('Clear all caffeine logs for today?')) return;
      const today = new Date().toDateString();
      logs = logs.filter(l => new Date(l.timestamp).toDateString() !== today);
      saveLogs();
      render();
    });
  }

  // Resize → redraw chart
  if (!window._cafResizeAttached) {
    window._cafResizeAttached = true;
    window.addEventListener('resize', () => {
      clearTimeout(window._cafResizeTimer);
      window._cafResizeTimer = setTimeout(() => drawChart(), 150);
    });
  }
}

/* ============================================================
 * Init
 * ============================================================ */
loadData();
render();
</script>
</body>
</html>
